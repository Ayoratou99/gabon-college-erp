# docker-compose.yml — CUK Concours local dev stack (postgres only).
#
# The PHP app + nginx no longer run in Docker — they're served directly by
# WAMP on the Windows host. Only Postgres lives in a container so we get a
# pristine, reproducible database without polluting the host.
#
# Cache, sessions and queue use the local filesystem (no Redis). Mail is
# logged via Laravel's `log` mailer in dev; set MAIL_MAILER=smtp + the
# MAIL_HOST/USERNAME/PASSWORD env vars when deploying to staging/prod.
#
# Bring up:   docker compose up -d
# Tear down:  docker compose down (volumes are preserved)

name: cuk

services:
  postgres:
    image: postgres:16-alpine
    container_name: cuk-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-cuk}
      POSTGRES_USER: ${DB_USERNAME:-cuk}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-cuk_local_password}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${FORWARD_DB_PORT:-5432}:5432"
    volumes:
      - cuk-postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-cuk} -d ${DB_DATABASE:-cuk}"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  cuk-postgres-data:
