# docker-compose.yml — CUK Concours local stack.
# Bring up with:  docker compose up -d --build
# Then exec into the app container:  docker compose exec app bash

name: cuk

services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      args:
        PHP_VERSION: "8.4"
        WWWUSER: "${WWWUSER:-1000}"
        WWWGROUP: "${WWWGROUP:-1000}"
    image: cuk/app:local
    container_name: cuk-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html:cached
      # Legacy file mounts — read-only during the transition.
      # The host paths point to the existing imageprofilecupk / documentcupk
      # folders the user already keeps outside the repo. Adjust to taste.
      - ${LEGACY_HOST_DOCUMENTS:-../legacy/documentcupk}:/legacy/documentcupk:ro
      - ${LEGACY_HOST_IMAGES:-../legacy/imageprofilecupk}:/legacy/imageprofilecupk:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [cuk]

  nginx:
    image: nginx:1.27-alpine
    container_name: cuk-nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:80"
    volumes:
      - .:/var/www/html:cached
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks: [cuk]

  postgres:
    image: postgres:16-alpine
    container_name: cuk-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-cuk}
      POSTGRES_USER: ${DB_USERNAME:-cuk}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-cuk_local_password}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${FORWARD_DB_PORT:-5432}:5432"
    volumes:
      - cuk-postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-cuk} -d ${DB_DATABASE:-cuk}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [cuk]

  redis:
    image: redis:7-alpine
    container_name: cuk-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "${FORWARD_REDIS_PORT:-6379}:6379"
    volumes:
      - cuk-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [cuk]

  mailhog:
    image: mailhog/mailhog:latest
    container_name: cuk-mailhog
    restart: unless-stopped
    ports:
      - "${FORWARD_MAIL_PORT:-1025}:1025"  # SMTP
      - "${FORWARD_MAILHOG_PORT:-8025}:8025" # web UI
    networks: [cuk]

  node:
    image: node:22-alpine
    container_name: cuk-node
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html:cached
    command: tail -f /dev/null
    profiles: [tools] # only spin up when you need it: docker compose --profile tools up node
    networks: [cuk]

networks:
  cuk:
    driver: bridge

volumes:
  cuk-postgres-data:
  cuk-redis-data:
