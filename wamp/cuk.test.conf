# ------------------------------------------------------------
# WAMP / Apache virtual host for the CUK Concours v2 app.
#
# Drop this in your WAMP Apache config:
#   1. Copy / paste this file into:
#        C:\wamp64\bin\apache\apacheX.Y.Z\conf\extra\httpd-vhosts.conf
#      (just append the <VirtualHost> block — leave the existing localhost
#      entry alone).
#   2. Make sure httpd.conf includes the vhost file:
#        Include conf/extra/httpd-vhosts.conf            (uncomment if needed)
#   3. Add the hostname to the Windows hosts file:
#        File: C:\Windows\System32\drivers\etc\hosts
#        Line: 127.0.0.1   cuk.test
#   4. Restart Apache (WAMP tray → Restart Services).
#   5. Open http://cuk.test/ in the browser.
#
# Paths assume the repo lives at C:\Users\HP\Documents\GitHub\koulamoutou\.
# Adjust DocumentRoot + <Directory> if you cloned elsewhere.
# ------------------------------------------------------------

<VirtualHost *:80>
    ServerName  cuk.test
    ServerAlias www.cuk.test

    DocumentRoot "C:/Users/HP/Documents/GitHub/koulamoutou/cuk-app/public"

    <Directory "C:/Users/HP/Documents/GitHub/koulamoutou/cuk-app/public">
        Options Indexes FollowSymLinks MultiViews
        AllowOverride All
        Require local

        # If you want to test from another machine on your LAN, swap
        # the Require above for:   Require all granted
        # (and reconsider whether you really want that exposed).
    </Directory>

    # Friendly log file names so they're easy to find.
    ErrorLog  "${SRVROOT}/logs/cuk.test-error.log"
    CustomLog "${SRVROOT}/logs/cuk.test-access.log" combined

    # Bump PHP upload limits for big inscription file uploads. WAMP enforces
    # them via php.ini globally too; these are the per-vhost overrides.
    php_admin_value upload_max_filesize 32M
    php_admin_value post_max_size       40M
    php_admin_value memory_limit        512M
    php_admin_value max_execution_time  120
</VirtualHost>
