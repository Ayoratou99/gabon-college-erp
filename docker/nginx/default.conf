server {
    listen 80 default_server;
    listen [::]:80 default_server;

    server_name _;
    root /var/www/html/public;
    index index.php;

    client_max_body_size 32m;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Allow Laravel's pretty URLs
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Hide hidden files and sensitive folders
    location ~ /\.(?!well-known) {
        deny all;
    }
    location ~* /(storage|bootstrap/cache|Modules)/ {
        # block direct access to non-public Laravel folders
        return 404;
    }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_read_timeout 120;
    }

    # Long cache for hashed assets produced by Vite
    location ~* \.(?:css|js|woff2?|ttf|eot|svg|png|jpe?g|gif|ico|webp|avif)$ {
        expires 7d;
        access_log off;
        try_files $uri /index.php?$query_string;
    }
}
